<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foudagraphy | Global Photography Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --card:#151515;
  --gold:#d6b25e;
  --text:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
background:url('IMG_8457.jpg') center/cover no-repeat;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:radial-gradient(circle, rgba(0,0,0,0.4), rgba(0,0,0,0.95));
}

.hero-content{
position:relative;
z-index:2;
}

.hero img{
width:140px;
height:140px;
border-radius:50%;
border:3px solid var(--gold);
object-fit:cover;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:42px;
margin-top:10px;
}

.hero p{
color:var(--gold);
margin:10px 0 20px;
}

.btn{
display:inline-block;
padding:12px 28px;
border:2px solid var(--gold);
color:var(--gold);
text-decoration:none;
border-radius:30px;
transition:.3s;
}

.btn:hover{
background:var(--gold);
color:#000;
transform:scale(1.05);
}

/* LINKS */
.links{
text-align:center;
padding:20px;
}

.links a{
display:inline-block;
margin:5px;
padding:10px 18px;
background:var(--card);
color:#fff;
border-radius:20px;
text-decoration:none;
transition:.3s;
}

.links a:hover{
background:var(--gold);
color:#000;
}

/* SECTIONS */
.section{
padding:60px 20px;
max-width:1000px;
margin:auto;
}

.section-title{
text-align:center;
color:var(--gold);
font-family:'Playfair Display',serif;
margin-bottom:30px;
}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.service{
background:var(--card);
padding:20px;
border-radius:12px;
text-align:center;
transition:.3s;
}

.service:hover{
transform:translateY(-5px);
border:1px solid var(--gold);
}

/* GALLERY */
.gallery{
column-count:3;
column-gap:10px;
}

.gallery img{
width:100%;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.03);
filter:brightness(1.1);
}

/* FORM */
.form{
max-width:500px;
margin:auto;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1e1e1e;
color:#fff;
}

button{
width:100%;
padding:14px;
background:var(--gold);
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.03);
filter:brightness(1.1);
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#lightbox img{
max-width:90%;
max-height:80%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
opacity:.5;
font-size:13px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">
<img src="MHMD0415.jpg">
<h1>Foudagraphy</h1>
<p>Global Photography & Visual Storytelling Agency</p>
<a class="btn" href="#booking">Book Now</a>
</div>
</div>

<!-- LINKS -->
<div class="links">
<a href="#">Instagram</a>
<a href="#">Facebook</a>
<a href="#">TikTok</a>
<a href="tel:01094500264">Call</a>
</div>

<!-- SERVICES -->
<div class="section">
<h2 class="section-title">Services</h2>
<div class="services">
<div class="service">📸 Photography</div>
<div class="service">🎬 Cinematic Video</div>
<div class="service">💍 Weddings</div>
<div class="service">🏢 Branding</div>
</div>
</div>

<!-- GALLERY -->
<div class="section">
<h2 class="section-title">Portfolio</h2>
<div class="gallery">
<img src="BG.jpg">
<img src="BG2.jpg">
<img src="BG3.jpg">
<img src="BG4.jpg">
<img src="BG5.jpg">
<img src="BG6.jpg">
</div>
</div>

<!-- BOOKING -->
<div class="section" id="booking">
<h2 class="section-title">Book a Session</h2>

<div class="form">
<form action="https://formspree.io/f/xdabenkv" method="POST">

<input type="text" name="name" placeholder="اسم العريس و العروسة" required>
<input type="tel" name="phone" placeholder="رقم هاتف للتواصل" required>
<textarea name="message" placeholder="تفاصيل التاريخ و المكان"></textarea>

<button type="submit">Send Request</button>

</form>
</div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<div class="close" onclick="closeLB()">×</div>
<img id="lbImg">
</div>

<!-- FOOTER -->
<footer>© 2026 Foudagraphy Studio</footer>

<script>
const imgs=document.querySelectorAll(".gallery img");
const lb=document.getElementById("lightbox");
const lbImg=document.getElementById("lbImg");

imgs.forEach(img=>{
img.onclick=()=>{
lb.style.display="flex";
lbImg.src=img.src;
}
});

function closeLB(){
lb.style.display="none";
}

lb.onclick=e=>{
if(e.target===lb) closeLB();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foudagraphy | Creative Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0b;
  --card:#161616;
  --gold:#d6b25e;
  --text:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* HERO */
.hero{
height:90vh;
background:url('IMG_8457.jpg') center/cover no-repeat;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}

.hero-content{
position:relative;
z-index:2;
}

.hero img{
width:130px;
height:130px;
border-radius:50%;
border:3px solid var(--gold);
object-fit:cover;
cursor:pointer;
}

.hero h1{font-size:34px;margin-top:10px;}
.hero p{color:var(--gold);margin:10px 0 20px;}

.btn{
display:inline-block;
padding:10px 24px;
border:2px solid var(--gold);
color:var(--gold);
text-decoration:none;
border-radius:30px;
transition:.3s;
}

.btn:hover{
background:var(--gold);
color:#000;
}

/* LINKS */
.links{
max-width:500px;
margin:auto;
padding:20px;
}

.link{
display:block;
text-align:center;
padding:14px;
margin:10px 0;
background:var(--card);
border-radius:12px;
text-decoration:none;
color:#fff;
transition:.3s;
}

.link:hover{
transform:translateY(-3px);
border:1px solid var(--gold);
}

/* GALLERY */
.section-title{
text-align:center;
color:var(--gold);
margin:30px 0 15px;
}

.gallery{
max-width:1000px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.grid img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:.3s;
will-change: transform;
}

.grid img:hover{
transform:scale(1.08);
}

/* FORM */
.form{
max-width:500px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1e1e1e;
color:#fff;
}

textarea{height:100px;resize:none;}

button{
width:100%;
padding:12px;
background:var(--gold);
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
flex-direction:column;
}

#lightbox img{
max-width:90%;
max-height:80%;
border-radius:10px;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

.controls{
margin-top:15px;
display:flex;
gap:20px;
}

.controls button{
width:auto;
padding:10px 15px;
background:var(--gold);
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">
<img src="MHMD0415.JPG" loading="eager" decoding="async">
<h1>Foudagraphy Studio</h1>
<p>Creative Photography & Visual Storytelling</p>
<a href="https://wa.me/201551927206" class="btn">احجز الآن</a>
</div>
</div>

<!-- LINKS -->
<div class="links">
<a class="link" href="https://www.facebook.com/MahmoudFouda8282">Facebook</a>
<a class="link" href="https://www.instagram.com/foudagraphy_official/">Instagram</a>
<a class="link" href="https://www.tiktok.com/@foudagraphy_official">TikTok</a>
<a class="link" href="tel:01094500264">Call Now</a>
</div>

<!-- GALLERY -->
<h2 class="section-title">Our Work</h2>

<div class="gallery">
<div class="grid">

<img src="BG.jpg" loading="lazy" decoding="async">
<img src="BG2.jpg" loading="lazy" decoding="async">
<img src="BG3.jpg" loading="lazy" decoding="async">
<img src="BG4.jpg" loading="lazy" decoding="async">
<img src="BG5.jpg" loading="lazy" decoding="async">
<img src="BG6.jpg" loading="lazy" decoding="async">

</div>
</div>

<!-- FORM -->
<h2 class="section-title">Book Now</h2>

<div class="form">
<form action="https://formspree.io/f/xdabenkv" method="POST">
<input type="text" name="name" placeholder="الاسم" required>
<input type="tel" name="phone" placeholder="رقم الهاتف" required>
<textarea name="message" placeholder="تفاصيل الحجز"></textarea>
<button type="submit">إرسال</button>
</form>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<div class="close" onclick="closeLightbox()">×</div>

<img id="lightbox-img">

<div class="controls">
<button onclick="prevImg()">Prev</button>
<button onclick="nextImg()">Next</button>
</div>
</div>

<script>
const images = Array.from(document.querySelectorAll(".grid img"));
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

let currentIndex = 0;

images.forEach((img, index) => {
img.addEventListener("click", () => {
currentIndex = index;
openLightbox();
});
});

function openLightbox(){
lightbox.style.display = "flex";
lightboxImg.src = images[currentIndex].src;
}

function closeLightbox(){
lightbox.style.display = "none";
}

function nextImg(){
currentIndex = (currentIndex + 1) % images.length;
lightboxImg.src = images[currentIndex].src;
}

function prevImg(){
currentIndex = (currentIndex - 1 + images.length) % images.length;
lightboxImg.src = images[currentIndex].src;
}

lightbox.addEventListener("click", (e) => {
if(e.target === lightbox) closeLightbox();
});
</script>

</body>
</html>
